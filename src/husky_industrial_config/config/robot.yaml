# Husky A300 Industrial Configuration
serial_number: a300-0001
version: 0
system:
  username: ros2-dev
  hosts:
    - hostname: husky-industrial
      ip: 192.168.131.1
  ros2:
    namespace: h1
    domain_id: 0
    middleware:
      implementation: rmw_fastrtps_cpp
    workspaces: []

platform:
  controller: ps4
  attachments:
    - name: top_plate
      type: a300.top_plate
      model: default
      parent: default_mount
      enabled: true

sensors:
  lidar3d:
    - model: velodyne_lidar
      urdf_enabled: true
      launch_enabled: true
      parent: top_plate_link
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        velodyne_driver_node:
          frame_id: lidar3d_0_laser
          device_ip: 192.168.131.25
          model: VLP16

  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: top_plate_link
      xyz: [0.05, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435i

  imu:
    - model: microstrain_imu
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.0, 0.0, 0.1]
      rpy: [0.0, 0.0, 0.0]